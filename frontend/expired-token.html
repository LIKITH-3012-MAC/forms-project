<!DOCTYPE html>
<html lang="en">

  <link rel="manifest" href="/assets/site.webmanifest">
  <meta name="theme-color" content="#020617">
  <script>
    (function initTheme() {
      const storedTheme = localStorage.getItem("event-theme");
      const prefersLight = window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: light)").matches;

      const theme = storedTheme || (prefersLight ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);

      const metaTheme = document.querySelector("meta[name='theme-color']");
      if (metaTheme) {
        metaTheme.setAttribute("content", theme === "light" ? "#f8fafc" : "#020617");
      }
    })();
  </script>
  <meta name="application-name" content="Event Registration">
  <meta name="apple-mobile-web-app-title" content="Event Registration">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f1115;
      --card-bg: rgba(22, 26, 33, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(245, 158, 11, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 40%);
    }

    .shell {
      width: 100%;
      max-width: 440px;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .icon {
      width: 64px;
      height: 64px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
      color: var(--warning);
      font-size: 28px;
      font-weight: 600;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #d1d5db 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .neo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      border: 1px solid transparent;
      box-sizing: border-box;
    }

    .neo-btn-primary {
      background: #1e222b;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.03);
      box-shadow: 
        -4px -4px 10px rgba(255, 255, 255, 0.02),
        4px 4px 10px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .neo-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 
        -6px -6px 12px rgba(255, 255, 255, 0.04),
        6px 6px 15px rgba(0, 0, 0, 0.5),
        0 0 12px rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.3);
      color: #818cf8;
    }

    .neo-btn-secondary {
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-muted);
      border-color: rgba(255, 255, 255, 0.05);
      box-shadow: 
        -2px -2px 6px rgba(255, 255, 255, 0.01),
        2px 2px 6px rgba(0, 0, 0, 0.3);
    }

    .neo-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .neo-btn:active {
      transform: translateY(1px);
      box-shadow: 
        inset -2px -2px 6px rgba(255, 255, 255, 0.05),
        inset 2px 2px 6px rgba(0, 0, 0, 0.6);
    }
  </style>

  <script src="/assets/theme.js"></script>
</body>
</html>
