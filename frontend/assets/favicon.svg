<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Border & Accents Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Rounded Square Background -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bgGrad)" stroke="url(#primaryGrad)" stroke-width="8" />

  <!-- Background Decorative Glowing Core -->
  <circle cx="256" cy="256" r="140" fill="url(#primaryGrad)" opacity="0.08" filter="url(#neonGlow)" />

  <!-- Document/Form Outer Wireframe -->
  <path d="M190 140h100l82 82v150c0 16.568-13.432 30-30 30H190c-16.568 0-30-13.432-30-30V170c0-16.568 13.432-30 30-30z" 
        fill="none" 
        stroke="url(#primaryGrad)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  
  <!-- Document Folded Page Corner -->
  <path d="M290 140v82h82" 
        fill="none" 
        stroke="url(#primaryGrad)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Minimal Form Lines (Neumorphic placeholder) -->
  <line x1="200" y1="200" x2="250" y2="200" stroke="url(#primaryGrad)" stroke-width="10" stroke-linecap="round" opacity="0.4" />
  <line x1="200" y1="260" x2="312" y2="260" stroke="url(#primaryGrad)" stroke-width="10" stroke-linecap="round" opacity="0.4" />

  <!-- Glowing Premium Checkmark (Verification Indicator) -->
  <path d="M205 320l35 35 68-68" 
        fill="none" 
        stroke="#06b6d4" 
        stroke-width="16" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#neonGlow)" />

  <!-- Small Payment Spark Dot/QR Block (Success/Payment Element) -->
  <rect x="330" y="325" width="22" height="22" rx="6" fill="#8b5cf6" filter="url(#neonGlow)" />
  <circle cx="341" cy="365" r="8" fill="#06b6d4" filter="url(#neonGlow)" />
</svg>
