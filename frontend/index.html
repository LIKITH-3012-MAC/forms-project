<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Workshop 2026 - SAKRA VISION</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="alternate icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/site.webmanifest">
  <meta name="theme-color" content="#020617">
  <script>
    (function initTheme() {
      const storedTheme = localStorage.getItem("event-theme");
      const prefersLight = window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: light)").matches;

      const theme = storedTheme || (prefersLight ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);

      const metaTheme = document.querySelector("meta[name='theme-color']");
      if (metaTheme) {
        metaTheme.setAttribute("content", theme === "light" ? "#f8fafc" : "#020617");
      }
    })();
  </script>
  <meta name="application-name" content="Event Registration">
  <meta name="apple-mobile-web-app-title" content="Event Registration">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f1115;
      --card-bg: rgba(22, 26, 33, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
    }

    .landing-shell {
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .event-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 
        0 4px 30px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .brand-pill {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: #818cf8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #d1d5db 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
    }

    .meta-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .meta-card span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .meta-card strong {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* Premium Neumorphic Button Styling */
    .neo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
    }

    .neo-btn-primary {
      background: #1e222b;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 
        -4px -4px 10px rgba(255, 255, 255, 0.03),
        4px 4px 10px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .neo-btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .neo-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 
        -6px -6px 12px rgba(255, 255, 255, 0.05),
        6px 6px 15px rgba(0, 0, 0, 0.6),
        0 0 15px rgba(99, 102, 241, 0.3);
      border-color: rgba(99, 102, 241, 0.3);
      color: #818cf8;
    }

    .neo-btn-primary:hover::before {
      opacity: 1;
    }

    .neo-btn-primary:active {
      transform: translateY(1px);
      box-shadow: 
        inset -2px -2px 6px rgba(255, 255, 255, 0.05),
        inset 2px 2px 6px rgba(0, 0, 0, 0.8);
    }

    .safe-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 24px;
      opacity: 0.8;
    }
  </style>
  <link rel="stylesheet" href="/assets/theme.css">
</head>
<body>
  <div class="theme-floating">
    <button id="themeToggle" class="neo-btn neo-btn-icon theme-toggle" aria-label="Toggle theme">
      <span id="themeIcon">🌙</span>
    </button>
  </div>
  <main class="landing-shell">
    <section class="event-card">
      <div class="brand-pill">SAKRA VISION Events</div>

      <h1 id="eventTitle">AI Workshop 2026</h1>
      <p class="subtitle" id="eventSubtitle">
        Complete your registration securely using manual UPI QR verification.
      </p>

      <div class="meta-grid">
        <div class="meta-card">
          <span>Amount</span>
          <strong id="eventAmount">₹700</strong>
        </div>
        <div class="meta-card">
          <span>Deadline</span>
          <strong id="eventDeadline">Loading...</strong>
        </div>
      </div>

      <a id="openFormBtn" class="neo-btn neo-btn-primary" href="form.html">
        Open Form &rarr;
      </a>

      <p class="safe-note">
        You will be redirected to the secure registration form.
      </p>
    </section>
  </main>

  <script>
        const CONFIG = {
      BACKEND_URL:
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "https://forms-project-p7np.onrender.com"
          : "https://forms-project-p7np.onrender.com"
    };

    if (
      !window.location.hostname.includes("localhost") &&
      !window.location.hostname.includes("127.0.0.1") &&
      CONFIG.BACKEND_URL.includes("localhost")
    ) {
      window.location.href = "/problem.html?reason=production_backend_url_misconfigured";
    }

    const BACKEND_URL = CONFIG.BACKEND_URL;

    async function loadConfig() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/form-config`);
        if (response.ok) {
          const config = await response.json();
          document.getElementById("eventTitle").innerText = config.event_name;
          document.getElementById("eventSubtitle").innerText = config.event_subtitle;
          document.getElementById("eventAmount").innerText = `₹${config.event_amount}`;
          
          if (config.deadline) {
            const dateStr = config.deadline.split(" ")[0];
            document.getElementById("eventDeadline").innerText = dateStr;
          }
        }
      } catch (err) {
        console.error("Config fetch failed, using defaults", err);
        document.getElementById("eventDeadline").innerText = "2026-06-01";
      }
    }

    window.addEventListener("DOMContentLoaded", loadConfig);
  </script>
  <script src="/assets/theme.js"></script>
</body>
</html>
