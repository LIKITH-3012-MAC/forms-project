<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal Login - SAKRA VISION</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="alternate icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/site.webmanifest">
  <meta name="theme-color" content="#020617">
  <script>
    (function initTheme() {
      const storedTheme = localStorage.getItem("event-theme");
      const prefersLight = window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: light)").matches;

      const theme = storedTheme || (prefersLight ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);

      const metaTheme = document.querySelector("meta[name='theme-color']");
      if (metaTheme) {
        metaTheme.setAttribute("content", theme === "light" ? "#f8fafc" : "#020617");
      }
    })();
  </script>
  <meta name="application-name" content="Event Registration">
  <meta name="apple-mobile-web-app-title" content="Event Registration">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f1115;
      --card-bg: rgba(22, 26, 33, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --danger: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
    }

    .login-shell {
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .brand-logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand-logo img {
      height: 40px;
      object-fit: contain;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      background: linear-gradient(135deg, #ffffff 0%, #d1d5db 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      color: #ffffff;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      background: rgba(255, 255, 255, 0.05);
    }

    .error-msg {
      color: var(--danger);
      font-size: 12px;
      margin-top: 6px;
      display: none;
      text-align: center;
    }

    .neo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      border: 1px solid transparent;
      box-sizing: border-box;
      text-align: center;
    }

    .neo-btn-primary {
      background: #1e222b;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.03);
      box-shadow: 
        -4px -4px 10px rgba(255, 255, 255, 0.02),
        4px 4px 10px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .neo-btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 
        -6px -6px 12px rgba(255, 255, 255, 0.04),
        6px 6px 15px rgba(0, 0, 0, 0.5),
        0 0 12px rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.3);
      color: #818cf8;
    }

    .neo-btn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 
        inset -2px -2px 6px rgba(255, 255, 255, 0.05),
        inset 2px 2px 6px rgba(0, 0, 0, 0.6);
    }

    .neo-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
  <link rel="stylesheet" href="/assets/theme.css">
  <link rel="stylesheet" href="/assets/performance.css">
</head>
<body>
  <div class="theme-floating">
    <button id="themeToggle" class="neo-btn neo-btn-icon theme-toggle" aria-label="Toggle theme">
      <span id="themeIcon">🌙</span>
    </button>
  </div>
  <main class="login-shell">
    <div class="card">
      <div class="brand-logo">
        <img src="assets/logo.png" alt="SAKRA VISION" onerror="this.style.display='none'" />
      </div>
      <h1>Administrative Console</h1>
      <p class="subtitle">Access controls for registration management portal</p>
 
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="password">Admin Secret Key</label>
          <input type="password" id="password" required placeholder="••••••••••••••••" />
          <div class="error-msg" id="loginError">Incorrect administrative password credential.</div>
        </div>
 
        <button type="submit" class="neo-btn neo-btn-primary" id="loginBtn">
          Authenticate &rarr;
        </button>
      </form>
    </div>
  </main>
 
  <script src="/assets/theme.js"></script>
  <script>
        const CONFIG = {
      BACKEND_URL:
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "https://forms-project-qcdc.onrender.com"
          : "https://forms-project-qcdc.onrender.com"
    };
 
    if (
      !window.location.hostname.includes("localhost") &&
      !window.location.hostname.includes("127.0.0.1") &&
      CONFIG.BACKEND_URL.includes("localhost")
    ) {
      window.location.href = "/problem.html?reason=production_backend_url_misconfigured";
    }
 
    async function handleLogin(e) {
      e.preventDefault();
      const pwd = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const errEl = document.getElementById("loginError");
 
      setButtonLoading(btn, "Verifying...");
      errEl.style.display = "none";
 
      try {
        const data = await apiFetch("/api/admin/login", {
          method: "POST",
          body: JSON.stringify({ admin_password: pwd })
        });
 
        // Store session token in local storage
        localStorage.setItem("admin_token", data.admin_token);
        
        markButtonSuccess(btn, "Success ✅");
        setTimeout(() => {
          window.location.href = "admin-dashboard.html";
        }, 600);
      } catch (error) {
        console.error(error);
        errEl.innerText = error.message || "Incorrect administrative password credential.";
        errEl.style.display = "block";
        markButtonError(btn, "Failed");
      }
    }

    // Auto redirect if token already present
    window.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("admin_token")) {
        window.location.href = "admin-dashboard.html";
      }
    });
  </script>
</body>
</html>
