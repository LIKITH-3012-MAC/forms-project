<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - SAKRA VISION</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="alternate icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/site.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <meta name="application-name" content="Event Registration">
  <meta name="apple-mobile-web-app-title" content="Event Registration">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090b0e;
      --card-bg: rgba(22, 26, 33, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
    }

    header {
      border-bottom: 1px solid var(--border-color);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 17, 21, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-title span {
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .admin-controls {
      display: flex;
      gap: 12px;
    }

    .dashboard-shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      text-align: left;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
    }

    .stat-card.pending { border-left: 4px solid var(--warning); }
    .stat-card.approved { border-left: 4px solid var(--success); }
    .stat-card.rejected { border-left: 4px solid var(--danger); }
    .stat-card.needs_correction { border-left: 4px solid var(--primary); }

    /* Filters Bar */
    .filter-bar {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: space-between;
    }

    .filter-inputs {
      display: flex;
      gap: 16px;
      flex-grow: 1;
      max-width: 800px;
    }

    .search-input-wrapper {
      position: relative;
      flex-grow: 2;
    }

    input, select {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #ffffff;
      width: 100%;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Registrations Table */
    .table-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow-x: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 13px;
    }

    th, td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    th {
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.05em;
      background: rgba(255, 255, 255, 0.01);
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .reg-id-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .reg-id-link:hover {
      text-decoration: underline;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-PENDING_REVIEW { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
    .badge-APPROVED { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .badge-REJECTED { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    .badge-NEEDS_CORRECTION { background: rgba(99, 102, 241, 0.1); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.2); }

    /* Button styles */
    .neo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid transparent;
      box-sizing: border-box;
    }

    .neo-btn-primary {
      background: #1e222b;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.03);
      box-shadow: 
        -2px -2px 6px rgba(255, 255, 255, 0.02),
        2px 2px 6px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .neo-btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 
        -4px -4px 8px rgba(255, 255, 255, 0.03),
        4px 4px 10px rgba(0, 0, 0, 0.5),
        0 0 10px rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.3);
      color: #818cf8;
    }

    .neo-btn-secondary {
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-muted);
      border-color: rgba(255, 255, 255, 0.05);
      box-shadow: 
        -1px -1px 3px rgba(255, 255, 255, 0.01),
        1px 1px 3px rgba(0, 0, 0, 0.3);
    }

    .neo-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .neo-btn:active {
      transform: translateY(1px);
      box-shadow: 
        inset -1px -1px 3px rgba(255, 255, 255, 0.05),
        inset 1px 1px 3px rgba(0, 0, 0, 0.6);
    }

    /* Toast styling */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(22, 26, 33, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 20px;
      border-radius: 12px;
      color: #ffffff;
      font-size: 13px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      animation: slideInRight 0.3s ease;
      border-left: 4px solid var(--primary);
    }

    .toast.toast-danger { border-left-color: var(--danger); }
    .toast.toast-success { border-left-color: var(--success); }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }


  </style>
  <link rel="stylesheet" href="/assets/performance.css">
</head>
<body>
  <header>
    <div class="brand-title">
      SAKRA VISION <span>Admin Panel</span>
    </div>
    <div class="admin-controls">
      <a href="/admin-analytics.html" class="neo-btn neo-btn-primary">View Graphs 📊</a>
      <button class="neo-btn neo-btn-secondary" id="exportBtn" onclick="exportCSV()">Export CSV</button>
      <button class="neo-btn neo-btn-secondary" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <main class="dashboard-shell">
    <!-- Stats Row -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Submissions</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-label">Pending Review</div>
        <div class="stat-value" id="statPending">0</div>
      </div>
      <div class="stat-card approved">
        <div class="stat-label">Approved</div>
        <div class="stat-value" id="statApproved">0</div>
      </div>
      <div class="stat-card rejected">
        <div class="stat-label">Rejected</div>
        <div class="stat-value" id="statRejected">0</div>
      </div>
      <div class="stat-card needs_correction">
        <div class="stat-label">Needs Correction</div>
        <div class="stat-value" id="statCorrection">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Submitted Today</div>
        <div class="stat-value" id="statToday">0</div>
      </div>
    </div>



    <!-- Filter Block -->
    <div class="filter-bar">
      <div class="filter-inputs">
        <div class="search-input-wrapper">
          <input type="text" id="searchInput" placeholder="Search by Reg ID, Name, Email, Phone, or UTR..." oninput="handleSearchFilter()" />
        </div>
        <div style="width: 200px;">
          <select id="statusFilter" onchange="handleSearchFilter()">
            <option value="">All Statuses</option>
            <option value="PENDING_REVIEW">Pending Review</option>
            <option value="APPROVED">Approved</option>
            <option value="REJECTED">Rejected</option>
            <option value="NEEDS_CORRECTION">Needs Correction</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Table container -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Reg ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>UTR / Ref ID</th>
            <th>Payment Status</th>
            <th>Submitted At</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="registrationsList">
          <!-- Populated by JS -->
          <tr>
            <td colspan="8" style="text-align: center; color: var(--text-muted); padding: 40px;">Fetching registrations...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination controls -->
    <div class="pagination-container" id="paginationControls" style="display: none;">
      <div class="pagination-info" id="paginationInfo">
        Showing 0 to 0 of 0 entries
      </div>
      <div class="pagination-buttons" id="paginationButtons">
        <!-- Dyn buttons -->
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/assets/theme.js"></script>
  <script>
        const CONFIG = {
      BACKEND_URL:
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "https://forms-project-p7np.onrender.com"
          : "https://forms-project-p7np.onrender.com"
    };

    if (
      !window.location.hostname.includes("localhost") &&
      !window.location.hostname.includes("127.0.0.1") &&
      CONFIG.BACKEND_URL.includes("localhost")
    ) {
      window.location.href = "/problem.html?reason=production_backend_url_misconfigured";
    }

    const BACKEND_URL = CONFIG.BACKEND_URL;
    let adminToken = localStorage.getItem("admin_token");

    function showToast(message, type = "info") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = `toast toast-${type}`;
      toast.innerText = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function checkAuth() {
      if (!adminToken) {
        window.location.href = "admin-login.html";
      }
    }

    function handleLogout() {
      localStorage.removeItem("admin_token");
      window.location.href = "admin-login.html";
    }

    let currentPage = 1;
    let pageSize = 25;

    async function loadData(search = "", status = "", page = 1) {
      checkAuth();
      currentPage = page;
      const listEl = document.getElementById("registrationsList");
      listEl.innerHTML = `
        <tr>
          <td colspan="8" style="text-align: center; color: var(--text-muted); padding: 40px;">
            <div class="spinner" style="margin: 0 auto 10px auto; display: block;"></div>
            Fetching registrations...
          </td>
        </tr>
      `;

      try {
        const queryParams = new URLSearchParams();
        if (search) queryParams.append("search", search);
        if (status) queryParams.append("payment_status", status);
        queryParams.append("page", page);
        queryParams.append("page_size", pageSize);

        const data = await apiFetchWithRetry(`/api/admin/registrations?${queryParams}`, {
          headers: {
            "Authorization": `Bearer ${adminToken}`,
            "X-Admin-Token": adminToken
          }
        });

        // Update stats
        document.getElementById("statTotal").innerText = data.stats.total;
        document.getElementById("statPending").innerText = data.stats.pending;
        document.getElementById("statApproved").innerText = data.stats.approved;
        document.getElementById("statRejected").innerText = data.stats.rejected;
        document.getElementById("statCorrection").innerText = data.stats.needs_correction;
        document.getElementById("statToday").innerText = data.stats.today;

        // Render Table
        listEl.innerHTML = "";

        if (data.registrations.length === 0) {
          listEl.innerHTML = `
            <tr>
              <td colspan="8" style="text-align: center; color: var(--text-muted); padding: 40px;">No matching records found.</td>
            </tr>
          `;
          document.getElementById("paginationControls").style.display = "none";
          return;
        }

        data.registrations.forEach(r => {
          listEl.innerHTML += `
            <tr>
              <td><a class="reg-id-link" href="admin-detail.html?rid=${r.registration_id}">${r.registration_id}</a></td>
              <td style="font-weight: 500; color: #ffffff;">${escapeHtml(r.full_name)}</td>
              <td>${escapeHtml(r.email)}</td>
              <td>${escapeHtml(r.phone)}</td>
              <td style="font-family: monospace; letter-spacing: 0.02em;">${escapeHtml(r.upi_reference_id)}</td>
              <td><span class="badge badge-${r.payment_status}">${r.payment_status.replace("_", " ")}</span></td>
              <td>${r.created_at}</td>
              <td><a class="neo-btn neo-btn-secondary" style="padding: 6px 12px; font-size: 12px;" href="admin-detail.html?rid=${r.registration_id}">View</a></td>
            </tr>
          `;
        });

        renderPagination(data.pagination);
      } catch (err) {
        console.error(err);
        if (err.status === 401 || (err.message && (err.message.includes("401") || err.message.toLowerCase().includes("unauthorized") || err.message.toLowerCase().includes("token")))) {
          handleLogout();
          return;
        }
        showToast("Error retrieving registrations database logs", "danger");
      }
    }

    function renderPagination(pagination) {
      const controls = document.getElementById("paginationControls");
      const info = document.getElementById("paginationInfo");
      const buttonsContainer = document.getElementById("paginationButtons");

      if (!pagination || pagination.total_filtered === 0) {
        controls.style.display = "none";
        return;
      }

      controls.style.display = "flex";

      const start = (pagination.page - 1) * pagination.page_size + 1;
      const end = Math.min(pagination.page * pagination.page_size, pagination.total_filtered);
      info.innerText = `Showing ${start} to ${end} of ${pagination.total_filtered} entries`;

      buttonsContainer.innerHTML = "";

      const prevBtn = document.createElement("button");
      prevBtn.className = "pagination-btn";
      prevBtn.innerText = "Previous";
      prevBtn.disabled = pagination.page === 1;
      prevBtn.onclick = () => {
        const search = document.getElementById("searchInput").value;
        const status = document.getElementById("statusFilter").value;
        loadData(search, status, pagination.page - 1);
      };
      buttonsContainer.appendChild(prevBtn);

      const maxPagesToShow = 5;
      let startPage = Math.max(1, pagination.page - 2);
      let endPage = Math.min(pagination.total_pages, startPage + maxPagesToShow - 1);
      if (endPage - startPage < maxPagesToShow - 1) {
        startPage = Math.max(1, endPage - maxPagesToShow + 1);
      }

      for (let i = startPage; i <= endPage; i++) {
        const btn = document.createElement("button");
        btn.className = `pagination-btn ${i === pagination.page ? 'active' : ''}`;
        btn.innerText = i;
        btn.onclick = () => {
          const search = document.getElementById("searchInput").value;
          const status = document.getElementById("statusFilter").value;
          loadData(search, status, i);
        };
        buttonsContainer.appendChild(btn);
      }

      const nextBtn = document.createElement("button");
      nextBtn.className = "pagination-btn";
      nextBtn.innerText = "Next";
      nextBtn.disabled = pagination.page === pagination.total_pages;
      nextBtn.onclick = () => {
        const search = document.getElementById("searchInput").value;
        const status = document.getElementById("statusFilter").value;
        loadData(search, status, pagination.page + 1);
      };
      buttonsContainer.appendChild(nextBtn);
    }

    let filterTimeout = null;
    function handleSearchFilter() {
      clearTimeout(filterTimeout);
      filterTimeout = setTimeout(() => {
        const search = document.getElementById("searchInput").value;
        const status = document.getElementById("statusFilter").value;
        loadData(search, status, 1);
      }, 300);
    }

    let isExporting = false;
    async function exportCSV() {
      if (isExporting) return;
      isExporting = true;
      checkAuth();
      const btn = document.getElementById("exportBtn");
      setButtonLoading(btn, "Exporting...");
      
      const search = document.getElementById("searchInput").value;
      const status = document.getElementById("statusFilter").value;
      
      const queryParams = new URLSearchParams();
      if (search) queryParams.append("search", search);
      if (status) queryParams.append("payment_status", status);

      try {
        const response = await fetch(`${BACKEND_URL}/api/admin/export.csv?${queryParams}`, {
          headers: {
            "Authorization": `Bearer ${adminToken}`,
            "X-Admin-Token": adminToken
          }
        });

        if (response.status === 401) {
          handleLogout();
          return;
        }

        if (!response.ok) throw new Error("Export failed");

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "registrations_export.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        showToast("CSV file downloaded successfully", "success");
        markButtonSuccess(btn, "Exported ✅");
      } catch (err) {
        console.error(err);
        showToast("Error exporting CSV data file", "danger");
        markButtonError(btn, "Failed");
      } finally {
        setTimeout(() => {
          isExporting = false;
        }, 1500);
      }
    }

    function escapeHtml(text) {
      if (!text) return "";
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    window.addEventListener("DOMContentLoaded", () => {
      checkAuth();
      loadData();
    });
  </script>
</body>
</html>
